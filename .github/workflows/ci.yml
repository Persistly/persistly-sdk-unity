name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Unity SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4

      - name: Validate contract bundle
        env:
          PERSISTLY_SKIP_CANONICAL_CONTRACT: "1"
        run: python3 Scripts/validate_contract.py

      - name: Package dry run
        run: Scripts/package_release.sh --dry-run
