openapi: 3.2.0
info:
  title: Persistly Runtime API
  summary: Save-sync API for offline-first and cross-device game persistence.
  description: |
    Persistly is a narrow save-sync and persistence layer for games.
    The public runtime API is intentionally limited to create, load, and sync operations around known save IDs.
    It is designed for single-player, idle, incremental, async, and cross-device resume flows rather than real-time multiplayer state or authoritative game simulation.
  contact:
    name: Persistly Support
    url: https://docs.persistly.app
    email: support@persistly.app
  license:
    name: Proprietary
    url: https://persistly.app/terms
  version: 0.3.0
servers:
  - url: https://api.persistly.app
    description: Public production runtime API
tags:
  - name: Operations
    description: Public operational endpoints for availability checks.
  - name: Save Sync
    description: Create, load, and sync saved game state by saveId.
  - name: Profiles
    description: Profile sessions and character saves for player-owned save sync.
  - name: Billing Webhooks
    description: Provider webhook endpoints used by Persistly billing automation.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [Operations]
      summary: Health check
      description: Lightweight readiness endpoint for uptime checks and deployment verification.
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                default:
                  summary: API is healthy
                  value:
                    ok: true
  /api/v1/saves:
    post:
      operationId: createSave
      tags: [Save Sync]
      summary: Create save
      description: Create a new save record and return its canonical save envelope.
      security:
        - RuntimeKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSaveRequest'
            examples:
              default:
                summary: Create a new save
                value:
                  playerRef: player-184
                  metadata:
                    characterName: Ayla
                    slot: 2
                  state:
                    gold: 100
                    level: 1
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEnvelopeResponse'
              examples:
                default:
                  summary: Canonical save envelope
                  value:
                    save:
                      saveId: sv_01HXYZ
                      playerRef: player-184
                      metadata:
                        characterName: Ayla
                        slot: 2
                      state:
                        gold: 120
                        level: 2
                      version: 4
                      createdAt: 2026-04-09T10:00:00Z
                      updatedAt: 2026-04-09T10:05:00Z
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/runtime-config:
    get:
      operationId: getRuntimeConfig
      tags: [Profiles]
      summary: Get runtime config
      description: Return SDK runtime configuration such as dashboard-controlled sync policy.
      security:
        - RuntimeKey: []
      responses:
        '200':
          description: Runtime configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles:
    post:
      operationId: createProfile
      tags: [Profiles]
      summary: Create profile
      description: Create a profile save and one profile session token. A first character can be created in the same request by sending the optional nested character object. externalProfileRef is stored as a non-authoritative reference only and is not publicly resolvable.
      security:
        - RuntimeKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: Profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles/{profileSaveId}:
    get:
      operationId: loadProfile
      tags: [Profiles]
      summary: Load profile
      description: Load a profile save using a profile session token. The session can access only the profile it belongs to.
      security:
        - RuntimeKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileSaveId'
        - $ref: '#/components/parameters/ProfileSession'
      responses:
        '200':
          description: Profile loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles/{profileSaveId}/account-data/sync:
    post:
      operationId: syncProfileAccountData
      tags: [Profiles]
      summary: Sync profile account data
      description: Replace or shallow-patch profile account-wide gameplay data while preserving server-owned schema and characterSlots. metadata may be replaced or cleared with null.
      security:
        - RuntimeKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileSaveId'
        - $ref: '#/components/parameters/ProfileSession'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncProfileAccountDataRequest'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAcceptedResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncConflictResponse'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles/{profileSaveId}/characters:
    post:
      operationId: createProfileCharacter
      tags: [Profiles]
      summary: Add character
      description: Create a character save under an existing profile and append its saveId to the profile state. metadata._persistly.slotKey is required and must be unique among active character slots for the profile.
      security:
        - RuntimeKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileSaveId'
        - $ref: '#/components/parameters/ProfileSession'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileCharacterRequest'
      responses:
        '201':
          description: Character created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeResponse'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/SlotAlreadyExists'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles/{profileSaveId}/characters/{characterSaveId}:
    get:
      operationId: loadProfileCharacter
      tags: [Profiles]
      summary: Load profile character
      description: Load a character save only when the profile session owns the profile and the character belongs to that profile.
      security:
        - RuntimeKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileSaveId'
        - $ref: '#/components/parameters/CharacterSaveId'
        - $ref: '#/components/parameters/ProfileSession'
      responses:
        '200':
          description: Character loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEnvelopeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles/{profileSaveId}/characters/{characterSaveId}/sync:
    post:
      operationId: syncProfileCharacter
      tags: [Profiles]
      summary: Sync profile character
      description: Sync a character save only when the profile session owns the profile and the character belongs to that profile.
      security:
        - RuntimeKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileSaveId'
        - $ref: '#/components/parameters/CharacterSaveId'
        - $ref: '#/components/parameters/ProfileSession'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncSaveRequest'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAcceptedResponse'
        '409':
          description: Conflict or archived character
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SyncConflictResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
              examples:
                archived:
                  summary: Archived character cannot be synced
                  value:
                    error:
                      code: character_archived
                      message: Archived characters cannot be synced.
                      details:
                        characterSaveId: sv_character
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/profiles/{profileSaveId}/characters/{characterSaveId}/archive:
    post:
      operationId: archiveProfileCharacter
      tags: [Profiles]
      summary: Archive profile character
      description: Archive a character slot under a profile. Archived characters remain loadable for recovery/history, cannot be synced through normal character sync, and free the slot key so a replacement character can be created.
      security:
        - RuntimeKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileSaveId'
        - $ref: '#/components/parameters/CharacterSaveId'
        - $ref: '#/components/parameters/ProfileSession'
      responses:
        '200':
          description: Character archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/saves/{saveId}:
    get:
      operationId: loadSave
      tags: [Save Sync]
      summary: Load save
      description: Load the canonical server save envelope for a known saveId.
      security:
        - RuntimeKey: []
      parameters:
        - name: saveId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveEnvelopeResponse'
              examples:
                default:
                  summary: Loaded save envelope
                  value:
                    save:
                      saveId: sv_01HXYZ
                      playerRef: player-184
                      metadata:
                        characterName: Ayla
                        slot: 2
                      state:
                        gold: 120
                        level: 2
                      version: 4
                      createdAt: 2026-04-09T10:00:00Z
                      updatedAt: 2026-04-09T10:05:00Z
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /api/v1/saves/{saveId}/sync:
    post:
      operationId: syncSave
      tags: [Save Sync]
      summary: Sync save
      description: Submit updated state for a known saveId using baseVersion for optimistic concurrency.
      security:
        - RuntimeKey: []
      parameters:
        - name: saveId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncSaveRequest'
            examples:
              default:
                summary: Sync local state against the last known version
                value:
                  baseVersion: 3
                  metadata:
                    characterName: Ayla
                    slot: 2
                  state:
                    gold: 120
                    level: 2
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAcceptedResponse'
              examples:
                accepted:
                  summary: Sync accepted
                  value:
                    status: accepted
                    version: 4
                    updatedAt: 2026-04-09T10:05:00Z
                    historyRetained: true
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncConflictResponse'
              examples:
                conflict:
                  summary: Sync conflict with canonical save
                  value:
                    status: conflict
                    save:
                      saveId: sv_01HXYZ
                      playerRef: player-184
                      metadata:
                        characterName: Ayla
                        slot: 2
                      state:
                        gold: 140
                        level: 3
                      version: 5
                      createdAt: 2026-04-09T10:00:00Z
                      updatedAt: 2026-04-09T10:06:00Z
                    details:
                      reason: base_version_mismatch
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
  /webhooks/stripe:
    post:
      operationId: handleStripeWebhook
      tags: [Billing Webhooks]
      summary: Stripe webhook
      description: Receives signed Stripe events and updates Persistly billing state and plan entitlements.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                required: [received]
                properties:
                  received:
                    type: boolean
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    RuntimeKey:
      type: http
      scheme: bearer
  parameters:
    ProfileSaveId:
      name: profileSaveId
      in: path
      required: true
      schema:
        type: string
    CharacterSaveId:
      name: characterSaveId
      in: path
      required: true
      schema:
        type: string
    ProfileSession:
      name: X-Persistly-Profile-Session
      in: header
      required: true
      schema:
        type: string
      description: Per-device profile session token returned when a profile is created.
  schemas:
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    Save:
      type: object
      required: [saveId, playerRef, metadata, state, version, createdAt, updatedAt]
      properties:
        saveId:
          type: string
        playerRef:
          type: [string, "null"]
          description: Optional developer-owned, non-secret player/account reference. It is not an authentication identity and is not queryable through the public runtime API; games must persist and load by saveId.
        metadata:
          type: object
          x-max-bytes: 16384
          additionalProperties: true
        state:
          type: object
          x-max-bytes: 262144
          additionalProperties: true
        version:
          type: integer
          minimum: 1
          description: Monotonic save revision. Starts at 1 on create and increments by 1 after each accepted sync.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateSaveRequest:
      type: object
      required: [state]
      properties:
        playerRef:
          type: string
          description: Optional developer-owned, non-secret player/account reference. It is not an authentication identity and is not queryable through the public runtime API; games must persist and load by saveId.
        metadata:
          type: object
          x-max-bytes: 16384
          additionalProperties: true
        state:
          type: object
          x-max-bytes: 262144
          additionalProperties: true
    SyncSaveRequest:
      type: object
      required: [baseVersion, state]
      properties:
        baseVersion:
          type: integer
          minimum: 1
          description: Last canonical save.version accepted by the client. Used for optimistic concurrency conflict detection.
        metadata:
          type: object
          x-max-bytes: 16384
          additionalProperties: true
        state:
          type: object
          x-max-bytes: 262144
          additionalProperties: true
    ExternalProfileRef:
      type: object
      required: [provider, subject]
      description: Optional non-authoritative identity reference stored for future trusted auth migration. It is not public lookup or proof of ownership.
      properties:
        provider:
          type: string
        subject:
          type: string
    SyncPolicy:
      type: object
      required: [minRemoteSyncIntervalSeconds, forceSyncCooldownSeconds, syncOnAppBackground, syncOnAppForeground, syncOnReconnect, maxQueuedLocalSnapshots]
      properties:
        minRemoteSyncIntervalSeconds:
          type: integer
          minimum: 1
        forceSyncCooldownSeconds:
          type: integer
          minimum: 1
        syncOnAppBackground:
          type: boolean
        syncOnAppForeground:
          type: boolean
        syncOnReconnect:
          type: boolean
        maxQueuedLocalSnapshots:
          type: integer
          minimum: 1
    RuntimeConfigResponse:
      type: object
      required: [syncPolicy]
      properties:
        syncPolicy:
          $ref: '#/components/schemas/SyncPolicy'
    PersistlyProfileState:
      type: object
      required: [schema, accountData, characterSlots]
      description: Shape stored in profile.state for profile-backed game saves.
      properties:
        schema:
          type: string
          const: persistly.profile.v1
        accountData:
          type: object
          description: Developer-controlled account-wide gameplay state.
          additionalProperties: true
        characterSlots:
          type: array
          description: Server-maintained character slot references. Profile account-data sync must preserve this list. Archived slots remain listed for history/recovery, and active slot uniqueness ignores archived entries.
          items:
            type: object
            required: [slotKey, characterSaveId, metadata]
            properties:
              slotKey:
                type: string
                pattern: ^[A-Za-z0-9_.-]{1,64}$
              characterSaveId:
                type: string
              metadata:
                type: object
                additionalProperties: true
              archived:
                type: boolean
              archivedAt:
                type: string
                format: date-time
    CreateProfileRequest:
      type: object
      properties:
        playerRef:
          type: string
          description: Optional non-secret developer reference. It is not public lookup or auth.
        externalProfileRef:
          $ref: '#/components/schemas/ExternalProfileRef'
        profileMetadata:
          type: object
          x-max-bytes: 16384
          additionalProperties: true
        accountData:
          type: object
          x-max-bytes: 262144
          description: Account-wide gameplay state stored in profile.state.accountData.
          additionalProperties: true
        character:
          $ref: '#/components/schemas/CreateProfileInitialCharacter'
    CreateProfileInitialCharacter:
      type: object
      required: [metadata, state]
      description: Optional first character slot to create with the profile.
      properties:
        metadata:
          $ref: '#/components/schemas/ProfileCharacterMetadata'
          x-max-bytes: 16384
          description: Character slot display/index metadata. metadata._persistly.slotKey identifies the named slot and is required when character is present.
        state:
          type: object
          x-max-bytes: 262144
          description: Character gameplay state.
          additionalProperties: true
    CreateProfileCharacterRequest:
      type: object
      required: [metadata, state]
      properties:
        metadata:
          $ref: '#/components/schemas/ProfileCharacterMetadata'
          x-max-bytes: 16384
          description: Character slot display/index metadata. metadata._persistly.slotKey identifies the named slot.
        state:
          type: object
          x-max-bytes: 262144
          additionalProperties: true
    ProfileCharacterMetadata:
      type: object
      required: [_persistly]
      additionalProperties: true
      properties:
        _persistly:
          type: object
          required: [slotKey]
          additionalProperties: false
          properties:
            slotKey:
              type: string
              pattern: ^[A-Za-z0-9_.-]{1,64}$
              description: Developer-facing character slot identifier. It must be unique among active characters under the profile.
    SyncProfileAccountDataRequest:
      type: object
      required: [baseVersion]
      description: Exactly one of accountData or accountDataPatch may be present. At least one of accountData, accountDataPatch, or metadata must be present.
      properties:
        baseVersion:
          type: integer
          minimum: 1
          description: Last canonical profile.version accepted by the client.
        accountData:
          type: object
          x-max-bytes: 262144
          description: Full replacement for profile.state.accountData.
          additionalProperties: true
        accountDataPatch:
          type: object
          x-max-bytes: 262144
          description: Shallow top-level patch for profile.state.accountData. Null values remove top-level keys.
          additionalProperties: true
        metadata:
          type:
            - object
            - 'null'
          x-max-bytes: 16384
          description: Full replacement for profile metadata. Send null to clear metadata.
          additionalProperties: true
    ProfileEnvelopeResponse:
      type: object
      required: [profileSaveId, profile]
      properties:
        profileSaveId:
          type: string
        profileSessionToken:
          type: string
          description: Returned only on profile creation. Store locally; it authorizes access only to this profile and its characters.
        profile:
          $ref: '#/components/schemas/Save'
          description: Profile save. Its state follows PersistlyProfileState.
        character:
          $ref: '#/components/schemas/Save'
        syncPolicy:
          $ref: '#/components/schemas/SyncPolicy'
    SaveEnvelopeResponse:
      type: object
      required: [save]
      properties:
        save:
          $ref: '#/components/schemas/Save'
    SaveOperationResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, conflict]
        save:
          $ref: '#/components/schemas/Save'
          description: Returned for conflict responses. Accepted sync responses are lightweight and omit the save payload.
        version:
          type: integer
          minimum: 1
          description: Current save version for accepted sync responses.
        updatedAt:
          type: string
          format: date-time
          description: Current save update timestamp for accepted sync responses.
        historyRetained:
          type: boolean
          description: Whether this accepted sync was retained as a restore-history snapshot.
        warnings:
          type: array
          items:
            type: string
        details:
          type: object
          additionalProperties: true
    SyncAcceptedResponse:
      type: object
      required: [status, version, updatedAt, historyRetained]
      properties:
        status:
          type: string
          enum: [accepted]
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
          format: date-time
        historyRetained:
          type: boolean
          description: Whether this sync was retained as a restore-history snapshot.
        warnings:
          type: array
          items:
            type: string
    SyncConflictResponse:
      type: object
      required: [status, save, details]
      properties:
        status:
          type: string
          enum: [conflict]
        save:
          $ref: '#/components/schemas/Save'
        details:
          type: object
          required: [reason]
          properties:
            reason:
              type: string
              enum: [base_version_mismatch]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [invalid_request, unauthorized, forbidden, not_found, conflict, slot_already_exists, character_archived, rate_limited, payload_too_large, server_error]
            message:
              type: string
            details:
              type: object
              additionalProperties: true
  responses:
    InvalidRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              summary: Invalid request body
              value:
                error:
                  code: invalid_request
                  message: Request body is invalid.
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              summary: Missing or invalid runtime key
              value:
                error:
                  code: unauthorized
                  message: Runtime key is invalid or missing.
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
